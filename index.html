<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Hub | 全球頂尖迷因排行榜、即時分析與梗圖生成</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <link id="dynamic-favicon" rel="icon" type="image/png" href="https://api.iconify.design/twemoji:face-with-tears-of-joy.svg">
    
    <style>
        :root {
            --bg-base: #0a0a0f;
            --bg-surface: rgba(18, 18, 26, 0.65);
            --bg-card-hover: rgba(26, 26, 38, 0.85);
            --border-subtle: rgba(255, 255, 255, 0.07);
            --brand-primary: linear-gradient(135deg, #ff3366 0%, #ff5e3a 100%);
            --brand-success: #00e676;
            --text-primary: #f5f5f7;
            --text-secondary: #9a9aae;
            --shadow-luxury: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            background-color: var(--bg-base); 
            color: var(--text-primary); 
            font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        .ambient-glow {
            position: fixed;
            top: -250px;
            left: 50%;
            transform: translateX(-50%);
            width: 1000px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 51, 102, 0.15) 0%, rgba(255, 94, 58, 0.05) 45%, transparent 70%);
            z-index: -1;
            pointer-events: none;
            filter: blur(40px);
        }

        header { 
            padding: 90px 0 45px 0; 
            text-align: center; 
            max-width: 640px;
            width: 90%;
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        header .badge {
            background: rgba(255, 51, 102, 0.12);
            color: #ff4375;
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 51, 102, 0.25);
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 16px;
            background: linear-gradient(180deg, #ffffff 30%, #b4b4bf 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .container { 
            max-width: 640px; 
            width: 92%; 
            padding-bottom: 100px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 50px;
            margin-bottom: 25px;
            color: var(--text-primary);
            text-transform: uppercase;
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 1.5px;
        }

        .section-header i { 
            background: var(--brand-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 迷因與分析卡片 */
        .meme-card, .analytics-card, .generator-card { 
            position: relative;
            background: var(--bg-surface); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-subtle); 
            border-radius: 28px; 
            padding: 28px; 
            margin-bottom: 35px; 
            box-shadow: var(--shadow-luxury);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .meme-card:hover {
            transform: translateY(-6px) scale(1.01);
            background: var(--bg-card-hover);
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), 0 0 40px rgba(255, 51, 102, 0.1);
        }

        .rank-tag {
            position: absolute;
            top: 24px;
            left: 24px;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 800;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .meme-viewport {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 24px;
            background: #0f0f14;
            aspect-ratio: 16 / 12;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .meme-img { 
            width: 100%; 
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .meme-card:hover .meme-img {
            transform: scale(1.03);
        }

        .content-meta h3 {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            line-height: 1.4;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            background: rgba(255,255,255,0.02);
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .heat-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .heat-indicator strong { color: var(--text-primary); }
        .heat-count {
            color: #ff3366;
            font-weight: 900;
            font-size: 1.1rem;
        }

        /* 內嵌迷你趨勢圖線條樣式 */
        .mini-trend-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 22px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        .mini-trend-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .mini-trend-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 700;
            text-transform: uppercase;
        }
        .mini-trend-status {
            font-size: 0.85rem;
            font-weight: 800;
        }
        .mini-svg-container {
            flex: 1;
            max-width: 160px;
            height: 32px;
        }

        /* 按鈕互動系統 */
        .btn {
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .btn-primary { 
            background: var(--brand-primary); 
            color: white; 
            padding: 18px 32px; 
            box-shadow: 0 8px 24px rgba(255, 51, 102, 0.3);
            width: 100%;
        }

        .btn-primary:hover:not(:disabled) { 
            box-shadow: 0 12px 32px rgba(255, 51, 102, 0.5);
            transform: translateY(-2px);
        }

        .btn-vote.voted {
            background: #14141f !important;
            color: #555566 !important;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: not-allowed;
            box-shadow: none !important;
            transform: none !important;
        }

        .btn-upload-label {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            width: 56px;
            height: 56px;
            flex-shrink: 0;
        }

        /* 大數據分析面板 */
        .analytics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 500px) {
            .analytics-grid { grid-template-columns: 1fr; }
        }

        .metric-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
        }

        .metric-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .metric-value {
            font-size: 2.25rem;
            font-weight: 900;
            background: linear-gradient(180deg, #fff 0%, #c4c4cf 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chart-box {
            background: rgba(255,255,255,0.01);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 24px;
            margin-top: 24px;
        }

        .chart-title {
            font-size: 0.95rem;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .svg-chart {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 梗圖生成器結構 */
        .generator-controls {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .control-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #meme-input { display: none; }

        .input-text {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-text:focus {
            border-color: #ff3366;
            background: rgba(0, 0, 0, 0.5);
        }

        .canvas-container {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #0b0b10;
            margin-bottom: 24px;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            position: relative;
            min-height: 260px; 
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #meme-canvas {
            max-width: 100%;
            max-height: 500px;
            object-fit: contain;
            display: block;
            z-index: 2;
        }

        .canvas-placeholder {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 600;
            position: absolute;
            text-align: center;
            z-index: 1;
        }

        .canvas-placeholder i {
            font-size: 2.5rem;
            margin-bottom: 14px;
            background: var(--brand-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
        }

        .btn-primary:disabled {
            background: #1c1c28;
            color: #4a4a5a;
            cursor: not-allowed;
            box-shadow: none;
        }

        footer {
            text-align: center;
            padding: 50px 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-subtle);
            width: 100%;
            letter-spacing: 1px;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

                <defs>

                        <stop offset="0%" style="stop-color:#ff3366;stop-opacity:1" />

                        <stop offset="0%" style="stop-color:#ff5e3a;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#ffca28;stop-opacity:1" />
                    </linearGradient>
                </defs>
            </svg>
        </div>
    </div>

    <div class="section-header">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        <span>病毒式梗圖生成器</span>
    </div>
    <div class="generator-card">
        <div class="canvas-container" id="drop-zone">
            <canvas id="meme-canvas"></canvas>
            <div class="canvas-placeholder" id="canvas-placeholder">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                點擊或拖曳圖片至此處上傳

        <div class="generator-controls">
            <div class="control-group">
                <input type="file" id="meme-input" accept="image/*">
                <label for="meme-input" class="btn btn-upload-label" aria-label="上傳圖片">
                    <i class="fa-solid fa-image"></i>

                <input type="text" id="meme-top-text" class="input-text" placeholder="填入迷因頂部文字...">
            </div>
            <div class="control-group">
                <input type="text" id="meme-bottom-text" class="input-text" placeholder="填入迷因底部文字...">
            </div>
        </div>

        <button id="download-meme" class="btn btn-primary" disabled>
            <i class="fa-solid fa-cloud-arrow-down"></i>

<script>
    // 📊 擴充至 TOP 5 數據庫，並成功抽換 TOP 3 為你的專屬圖檔
    const memeData = [
        { 
            id: "m-001", 
            platform: "TikTok", 
            title: "週一早上的我（附帶真實傷害）", 
            imgUrl: "https://p16-comment-sign-sg.tiktokcdn.com/tos-alisg-i-zt8igodiya-sg/8fdc61dd7228454eb217a9a5caf035b5~tplv-jj85edgx6n-image-medium.jpeg?dr=8569&refresh_token=bf361e5c&x-expires=1782306000&x-signature=VgVuUcOf07ra4beC7OuYpIexTeA%3D&t=67a6c45e&ps=a0626fcd&shp=ff37627b&shcp=ff37627b&idc=my", 
            heat: 2850,
            trendColor: "#00e676",
            trendText: "🔥 暴增 +48.3%",
            path: "M0 25 Q15 5, 30 18 T60 12 T90 2 T120 15 T150 2" // 走勢曲線資料
        },
        { 
            id: "m-002", 
            platform: "Imgur", 
            title: "這群演算法真的太狠了", 
            imgUrl: "https://i.imgur.com/W4XdfyR_d.webp?maxwidth=520&shape=thumb&fidelity=high", 
            heat: 2100,
            trendColor: "#00e676",
            trendText: "📈 穩步上升 +24.1%",
            path: "M0 28 Q15 20, 30 22 T60 15 T90 10 T120 8 T150 5"
        },
        { 
            id: "m-003", 
            platform: "Reddit", 
            title: "1 meter in 1 second (千空與阿姆的極速化學反應)", 
            imgUrl: "https://images.jpg.cm/2026/05/26/image_6f52be.jpg", // 已載入你提供的特定圖片
            heat: 1950,
            trendColor: "#ff3366",
            trendText: "⚡ 狂飆新進榜",
            path: "M0 30 Q15 28, 30 25 T60 22 T90 14 T120 6 T150 1"
        },
        { 
            id: "m-004", 
            platform: "Facebook", 
            title: "這張圖到底要傳幾年？（傳家寶級老梗複刻）", 
            imgUrl: "https://scontent-tpe1-1.xx.fbcdn.net/v/t39.30808-6/705122885_1580248270330103_7938124730336629191_n.jpg?stp=dst-jpg_p526x296_tt6&_nc_cat=108&ccb=1-7&_nc_sid=127cfc&_nc_ohc=qpAPk4p_USgQ7kNvwHVUPeT&_nc_oc=AdrQZ3J1c66HrP5BwuPTiG_naJ8NOUKL8xKSBxULQViB_fLCC51yu1qcqqN6InDx9pSg4oNYKm233BWcOYNFLcKU&_nc_zt=23&_nc_ht=scontent-tpe1-1.xx&_nc_gid=l9KN6LwrL93kGL_oSlsWcA&_nc_ss=7b2a8&oh=00_Af6He7FEU1-qhfZE-klrZeNtaGzTPajYvwSWBCa8YjUBrg&oe=6A1A25CF", 
            heat: 1540,
            trendColor: "#ffca28",
            trendText: "📊 本週持平",
            path: "M0 15 Q15 14, 30 16 T60 15 T90 15 T120 16 T150 15"
        },
        { 
            id: "m-005", 
            platform: "X (Twitter)", 
            title: "當主管說『這件事很簡單，你順便看一下』", 
            imgUrl: "https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?q=80&w=600&auto=format&fit=crop", 
            heat: 1210,
            trendColor: "#00e676",
            trendText: "🔺 微幅爬升 +8.4%",
            path: "M0 25 Q15 22, 30 24 T60 20 T90 19 T120 17 T150 14"
        }
    ];

    // 背景滑鼠追蹤微互動
    const ambient = document.getElementById('ambient');
    document.addEventListener('mousemove', (e) => {
        if(ambient) {
            const x = (e.clientX / window.innerWidth - 0.5) * 50;
            ambient.style.transform = `translateX(calc(-50% + ${x}px))`;
        }
    });

    // 刷新中央分析池數據與前三名長條圖
    function refreshAnalytics() {
        const totalHeat = memeData.reduce((sum, item) => sum + item.heat, 0);
        const totalCounter = document.getElementById('total-heat-counter');
        
        if (totalCounter) {
            let start = parseInt(totalCounter.textContent.replace(/,/g, '')) || 0;
            let duration = 400;
            let startTime = null;

            function animateNumber(timestamp) {
                if (!startTime) startTime = timestamp;
                let progress = timestamp - startTime;
                let current = Math.min(Math.floor(start + (totalHeat - start) * (progress / duration)), totalHeat);
                totalCounter.textContent = current.toLocaleString();
                if (progress < duration) requestAnimationFrame(animateNumber);
            }
            requestAnimationFrame(animateNumber);
        }

        // 同步前三名到下方的分析長條圖
        const maxHeat = Math.max(...memeData.map(o => o.heat));
        for(let i=0; i<3; i++) {
            const bar = document.getElementById(`bar-${i}`);
            if (bar && memeData[i]) {
                bar.setAttribute('width', (memeData[i].heat / maxHeat) * 360);
            }
        }
    }

    // 動態建構 TOP 5 迷因卡片與嵌入式 Mini 趨勢圖
    const rankingContainer = document.getElementById('meme-container');
    if (rankingContainer) {
        memeData.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'meme-card';
            card.innerHTML = `
                <div class="rank-tag">
                    <i class="fa-solid fa-trophy" style="color: #ffca28;"></i>
                    <span>TOP 0${index + 1}</span>
                </div>
                <div class="meme-viewport">
                    <img src="${item.imgUrl}" class="meme-img" alt="Meme Media" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop'">
                </div>
                <div class="content-meta">
                    <h3 class="meme-title"></h3>
                    <div class="status-bar">
                        <div class="heat-indicator">
                            <i class="fa-solid fa-chart-line" style="color:#ff3366;"></i>
                            <span>來源渠道: <strong class="meme-platform"></strong></span>
                        </div>
                        <div class="heat-indicator">
                            <span>熱度權重:</span>
                            <span class="heat-count"></span>
                        </div>
                    </div>

                    <div class="mini-trend-box">
                        <div class="mini-trend-info">
                            <span class="mini-trend-label">週/月擴散監測</span>
                            <span class="mini-trend-status" style="color:${item.trendColor};">${item.trendText}</span>
                        </div>
                        <div class="mini-svg-container">
                            <svg viewBox="0 0 150 32" width="100%" height="100%">
                                <path d="${item.path}" fill="none" stroke="${item.trendColor}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                    </div>

                    <div class="action-group">
                        <button class="btn btn-primary btn-vote" aria-label="投票支持">
                            <i class="fa-solid fa-bolt"></i>
                            <span>UPVOTE</span>
                        </button>
                    </div>
                </div>
            `;
            
            card.querySelector('.meme-title').textContent = item.title;
            card.querySelector('.meme-platform').textContent = item.platform;
            
            const voteBtn = card.querySelector('.btn-vote');
            const heatSpan = card.querySelector('.heat-count');
            heatSpan.textContent = item.heat.toLocaleString();

            voteBtn.addEventListener('click', () => {
                item.heat += 150; 
                heatSpan.textContent = item.heat.toLocaleString();
                voteBtn.disabled = true;
                voteBtn.classList.add('voted');
                voteBtn.innerHTML = `<i class="fa-solid fa-circle-check" style="color:var(--brand-success)"></i> <span>已投票 VERIFIED VOTE</span>`;
                
                refreshAnalytics();
                if (navigator.vibrate) navigator.vibrate(15);
            });

            rankingContainer.appendChild(card);
        });
    }

    refreshAnalytics();

    // 梗圖生成器核心功能
    const memeInput = document.getElementById('meme-input');
    const dropZone = document.getElementById('drop-zone');
    const memeTopText = document.getElementById('meme-top-text');
    const memeBottomText = document.getElementById('meme-bottom-text');
    const memeCanvas = document.getElementById('meme-canvas');
    const canvasPlaceholder = document.getElementById('canvas-placeholder');
    const downloadMeme = document.getElementById('download-meme');

    if (memeCanvas) {
        const ctx = memeCanvas.getContext('2d');
        let originalImage = null;

        if (dropZone && memeInput) {
            dropZone.addEventListener('click', () => memeInput.click());
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.style.borderColor = "#ff3366";
            });
            dropZone.addEventListener('dragleave', () => {
                dropZone.style.borderColor = "rgba(255, 255, 255, 0.15)";
            });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.style.borderColor = "rgba(255, 255, 255, 0.15)";
                if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
            });

            memeInput.addEventListener('change', (e) => {
                if (e.target.files.length) processFile(e.target.files[0]);
            });
        }

        function processFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    if (canvasPlaceholder) canvasPlaceholder.style.display = 'none';
                    if (downloadMeme) downloadMeme.disabled = false;
                    updateMemeCanvas();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        if (memeTopText) memeTopText.addEventListener('input', updateMemeCanvas);
        if (memeBottomText) memeBottomText.addEventListener('input', updateMemeCanvas);

        function updateMemeCanvas() {
            if (!originalImage || !ctx) return;

            const maxDimension = 1000;
            let width = originalImage.width;
            let height = originalImage.height;

            if (width > maxDimension || height > maxDimension) {
                if (width > height) {
                    height = Math.round((height * maxDimension) / width);
                    width = maxDimension;
                } else {
                    width = Math.round((width * maxDimension) / height);
                    height = maxDimension;
                }
            }

            memeCanvas.width = width;
            memeCanvas.height = height;
            ctx.drawImage(originalImage, 0, 0, width, height);

            const fontSize = Math.floor(memeCanvas.height * 0.09);
            ctx.font = `900 ${fontSize}px 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif`;
            ctx.fillStyle = 'white';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = fontSize / 6;
            ctx.lineJoin = 'bevel';
            ctx.textAlign = 'center';

            const topText = memeTopText ? memeTopText.value : "";
            const bottomText = memeBottomText ? memeBottomText.value : "";

            if (topText) {
                ctx.textBaseline = 'top';
                ctx.strokeText(topText, memeCanvas.width / 2, 25);
                ctx.fillText(topText, memeCanvas.width / 2, 25);
            }

            if (bottomText) {
                ctx.textBaseline = 'bottom';
                ctx.strokeText(bottomText, memeCanvas.width / 2, memeCanvas.height - 25);
                ctx.fillText(bottomText, memeCanvas.width / 2, memeCanvas.height - 25);
            }
        }

        if (downloadMeme) {
            downloadMeme.addEventListener('click', () => {
                if (!originalImage) return;
                const dataURL = memeCanvas.toDataURL('image/jpeg', 0.9);
                const a = document.createElement('a');
                a.href = dataURL;
                a.download = `MemeHub-${new Date().getTime()}.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
        }
    }
</script>

</body>
</html>
